name: Security Scans

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

jobs:
  scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run check:security
      - run: npm audit --omit=dev --audit-level=high
